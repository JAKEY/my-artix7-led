name: FPGA_Verilog_Check

on: [push]

jobs:
  synthesis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 使用官方維護、絕對穩定的開源綜合工具
      - name: Setup OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Run Yosys Synthesis
        run: |
          yosys -p "synth_xilinx -top top -edif design.edif" top.v
          echo "✅ 編譯成功！Verilog 語法正確，邏輯閘轉換完成。"
